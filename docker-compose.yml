services:
  nginx:
      image: nginx:latest
      ports:
        - "${NGINX_PORT:-443}:443"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - ./certs:/etc/nginx/certs
      depends_on:
        livekit:
          condition: service_healthy
        backend:
          condition: service_healthy
        frontend:
          condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "0.0.0.0:60000-60020:60000-60020/udp"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7880"]
      interval: 10s
      timeout: 5s
      retries: 3

  livekit-egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - ./recordings:/recordings
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN

  backend:
    build: ./backend
    command: node dist/index.js
    env_file: .env
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # --- Dev commands (run with: docker compose run --rm <service> ) ---
  backend-dev:
    build: ./backend
    command: npx tsx watch src/index.ts
    ports:
      - "0.0.0.0:3001:3001"
    env_file: .env
    volumes:
      - ./backend/src:/app/src
    depends_on:
      livekit:
        condition: service_healthy
    profiles: ["dev"]

  backend-test:
    build: ./backend
    command: npm test
    env_file: .env
    volumes:
      - ./backend/src:/app/src
    profiles: ["dev"]

  frontend-dev:
    build:
      context: ./frontend
      target: build
    command: npx vite --host 0.0.0.0
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend/src:/app/src
    profiles: ["dev"]

  frontend-build:
    build: ./frontend
    command: npm run build
    volumes:
      - ./frontend:/app
    profiles: ["dev"]
