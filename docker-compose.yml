services:
  nginx:
      image: nginx:latest
      ports:
        - "${NGINX_PORT:-443}:443"
      env_file: .env
      environment:
        - NGINX_ENVSUBST_TEMPLATE_VARS=SERVER_NAME
      volumes:
        - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
        - ./certs:/etc/nginx/certs
      depends_on:
        livekit:
          condition: service_healthy
        backend:
          condition: service_healthy
        frontend:
          condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    # 用 envsubst 把 livekit.yaml.template 的 ${SERVER_NAME} 替換成 .env 的 LAN IP，
    # 確保 ICE candidates 回報正確的外部 IP，行動裝置才能建立 WebRTC 媒體連線。
    entrypoint: ["sh", "-c", "sed \"s|__SERVER_NAME__|$SERVER_NAME|g\" /etc/livekit.yaml.template > /tmp/livekit.yaml && exec /livekit-server --config /tmp/livekit.yaml"]
    env_file: .env
    volumes:
      - ./livekit.yaml.template:/etc/livekit.yaml.template:ro
    ports:
      - "0.0.0.0:60000-60020:60000-60020/udp"
      - "7880:7880"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7880"]
      interval: 10s
      timeout: 5s
      retries: 3

  livekit-egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - ./recordings:/recordings
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN

  backend:
    build:
      context: ./backend
      target: build
    command: npx tsx watch src/index.ts
    env_file: .env
    volumes:
      - ./backend/src:/app/src
      - ./recordings:/recordings
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 80
    env_file: .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # --- Dev commands (run with: docker compose run --rm <service> ) ---
  backend-dev:
    build: ./backend
    command: npx tsx watch src/index.ts
    ports:
      - "0.0.0.0:3001:3001"
    env_file: .env
    volumes:
      - ./backend/src:/app/src
    depends_on:
      livekit:
        condition: service_healthy
    profiles: ["dev"]

  backend-test:
    build: ./backend
    command: npm test
    env_file: .env
    volumes:
      - ./backend/src:/app/src
    profiles: ["dev"]

  frontend-dev:
    build:
      context: ./frontend
      target: build
    command: npx vite --host 0.0.0.0
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend/src:/app/src
    profiles: ["dev"]

  frontend-build:
    build: ./frontend
    command: npm run build
    volumes:
      - ./frontend:/app
    profiles: ["dev"]
